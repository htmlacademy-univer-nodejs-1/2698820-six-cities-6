openapi: 3.1.0
info:
  title: Six Cities API
  version: 1.0.0
  description: REST API для проекта «Шесть городов».
servers:
  - url: http://localhost:4000/api
    description: Local server
tags:
  - name: Offers
  - name: Comments
  - name: Users

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    OfferIdParam:
      name: offerId
      in: path
      required: true
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{24}$'
    CityNameParam:
      name: cityName
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/CityName'
    FavoriteStatusParam:
      name: status
      in: path
      required: true
      description: '1 - add to favorites, 0 - remove from favorites'
      schema:
        type: string
        enum: ['0', '1']

  schemas:
    UserType:
      type: string
      enum: [usual, pro]

    CityName:
      type: string
      enum: [Paris, Cologne, Brussels, Amsterdam, Hamburg, Dusseldorf]

    HousingType:
      type: string
      enum: [apartment, house, room, hotel]

    Amenity:
      type: string
      enum:
        - Breakfast
        - Air conditioning
        - Laptop friendly workspace
        - Baby seat
        - Washer
        - Towels
        - Fridge

    Coordinates:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double

    City:
      type: object
      required: [name, location]
      properties:
        name:
          $ref: '#/components/schemas/CityName'
        location:
          $ref: '#/components/schemas/Coordinates'

    User:
      type: object
      required: [id, name, email, userType]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 15
        email:
          type: string
          format: email
        avatarPath:
          type:
            - string
            - 'null'
        userType:
          $ref: '#/components/schemas/UserType'

    NewUser:
      type: object
      required: [name, email, password, userType]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 15
        email:
          type: string
          format: email
        avatarPath:
          type:
            - string
            - 'null'
        password:
          type: string
          minLength: 6
          maxLength: 12
        userType:
          $ref: '#/components/schemas/UserType'

    LoginUser:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          maxLength: 12

    AuthToken:
      type: object
      required: [token]
      properties:
        token:
          type: string

    OfferSummary:
      type: object
      required:
        - id
        - title
        - rentalPrice
        - housingType
        - publishDate
        - city
        - previewImage
        - isPremium
        - isFavorite
        - rating
        - commentsCount
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 10
          maxLength: 100
        rentalPrice:
          type: integer
          minimum: 100
          maximum: 100000
        housingType:
          $ref: '#/components/schemas/HousingType'
        publishDate:
          type: string
          format: date-time
        city:
          $ref: '#/components/schemas/City'
        previewImage:
          type: string
        isPremium:
          type: boolean
        isFavorite:
          type: boolean
        rating:
          type: number
          minimum: 1
          maximum: 5
        commentsCount:
          type: integer
          minimum: 0

    OfferDetail:
      allOf:
        - $ref: '#/components/schemas/OfferSummary'
        - type: object
          required:
            - description
            - images
            - roomsCount
            - guestsCount
            - amenities
            - author
          properties:
            description:
              type: string
              minLength: 20
              maxLength: 1024
            images:
              type: array
              minItems: 6
              maxItems: 6
              items:
                type: string
            roomsCount:
              type: integer
              minimum: 1
              maximum: 8
            guestsCount:
              type: integer
              minimum: 1
              maximum: 10
            amenities:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/Amenity'
            author:
              $ref: '#/components/schemas/User'

    NewOffer:
      type: object
      required:
        - title
        - description
        - city
        - previewImage
        - images
        - isPremium
        - housingType
        - roomsCount
        - guestsCount
        - rentalPrice
        - amenities
        - coordinates
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        city:
          $ref: '#/components/schemas/CityName'
        previewImage:
          type: string
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
        isPremium:
          type: boolean
        housingType:
          $ref: '#/components/schemas/HousingType'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
        guestsCount:
          type: integer
          minimum: 1
          maximum: 10
        rentalPrice:
          type: integer
          minimum: 100
          maximum: 100000
        amenities:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Amenity'
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    UpdateOffer:
      type: object
      properties:
        title:
          type: string
          minLength: 10
          maxLength: 100
        description:
          type: string
          minLength: 20
          maxLength: 1024
        city:
          $ref: '#/components/schemas/CityName'
        previewImage:
          type: string
        images:
          type: array
          minItems: 6
          maxItems: 6
          items:
            type: string
        isPremium:
          type: boolean
        housingType:
          $ref: '#/components/schemas/HousingType'
        roomsCount:
          type: integer
          minimum: 1
          maximum: 8
        guestsCount:
          type: integer
          minimum: 1
          maximum: 10
        rentalPrice:
          type: integer
          minimum: 100
          maximum: 100000
        amenities:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Amenity'
        coordinates:
          $ref: '#/components/schemas/Coordinates'

    Comment:
      type: object
      required: [id, text, publishDate, rating, author]
      properties:
        id:
          type: string
          format: uuid
        text:
          type: string
          minLength: 5
          maxLength: 1024
        publishDate:
          type: string
          format: date-time
        rating:
          type: integer
          minimum: 1
          maximum: 5
        author:
          $ref: '#/components/schemas/User'

    NewComment:
      type: object
      required: [text, rating]
      properties:
        text:
          type: string
          minLength: 5
          maxLength: 1024
        rating:
          type: integer
          minimum: 1
          maximum: 5

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: array
          items:
            type: string

paths:
  /offers:
    get:
      tags: [Offers]
      summary: Get offers list
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 60
            minimum: 1
          description: Number of offers to return
      responses:
        '200':
          description: Offers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferSummary'
    post:
      tags: [Offers]
      summary: Create offer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewOffer'
      responses:
        '201':
          description: Offer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDetail'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized

  /offers/{offerId}:
    get:
      tags: [Offers]
      summary: Get offer details
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
      responses:
        '200':
          description: Offer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDetail'
        '404':
          description: Offer not found
    patch:
      tags: [Offers]
      summary: Update offer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOffer'
      responses:
        '200':
          description: Updated offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDetail'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Offer not found
    delete:
      tags: [Offers]
      summary: Delete offer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
      responses:
        '204':
          description: Offer deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Offer not found

  /offers/{offerId}/comments:
    get:
      tags: [Comments]
      summary: Get offer comments
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 50
      responses:
        '200':
          description: Comments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comment'
        '404':
          description: Offer not found
    post:
      tags: [Comments]
      summary: Add comment to offer
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewComment'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comment'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '404':
          description: Offer not found

  /offers/premium/{cityName}:
    get:
      tags: [Offers]
      summary: Get premium offers by city
      parameters:
        - $ref: '#/components/parameters/CityNameParam'
      responses:
        '200':
          description: Premium offers
          content:
            application/json:
              schema:
                type: array
                maxItems: 3
                items:
                  $ref: '#/components/schemas/OfferSummary'

  /offers/favorites:
    get:
      tags: [Offers]
      summary: Get favorite offers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorite offers list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfferSummary'
        '401':
          description: Unauthorized

  /offers/{offerId}/favorite/{status}:
    post:
      tags: [Offers]
      summary: Change favorite status
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/OfferIdParam'
        - $ref: '#/components/parameters/FavoriteStatusParam'
      responses:
        '200':
          description: Updated offer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OfferDetail'
        '401':
          description: Unauthorized
        '404':
          description: Offer not found

  /users/register:
    post:
      tags: [Users]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewUser'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation error
        '409':
          description: Email already exists

  /users/login:
    post:
      tags: [Users]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginUser'
      responses:
        '200':
          description: Auth token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthToken'
        '401':
          description: Invalid email or password

  /users/logout:
    delete:
      tags: [Users]
      summary: Logout user
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session closed
        '401':
          description: Unauthorized

  /users/check:
    get:
      tags: [Users]
      summary: Check auth state
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authorized user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized

  /users/avatar:
    post:
      tags: [Users]
      summary: Upload user avatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid file
        '401':
          description: Unauthorized
